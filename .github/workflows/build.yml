name: Build Flutter APK

# 触发条件
on:
  # 推送到 main 分支时触发
  push:
    branches: [ main, master ]
  # 手动触发
  workflow_dispatch:
  # Pull Request 时触发（可选）
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      # 2. 设置 Java 环境
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      # 3. 设置 Flutter 环境
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      # 4. 获取依赖
      - name: Get Dependencies
        run: flutter pub get
      
      # 5. 分析代码（可选，检查语法错误）
      - name: Analyze Code
        run: flutter analyze || true
      
      # 6. 构建 APK
      - name: Build APK
        run: flutter build apk --release
      
      # 7. 获取版本号
      - name: Get Version
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          BUILD_NUMBER=$(grep 'version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
      
      # 8. 上传 APK 文件（Artifacts，会打包成 zip）
      - name: Upload APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: memory-island-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
      
      # 9. 创建 Release（每次推送都创建，可直接下载 APK）
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}-build${{ steps.version.outputs.build_number }}-${{ github.run_number }}
          name: 记忆岛 v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})
          body: |
            ## 更新内容
            
            详见 commit 记录。
            
            ## 下载
            
            点击下方 `app-release.apk` 直接下载安装。
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
