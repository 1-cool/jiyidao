name: Build Flutter APK

# 触发条件
on:
  # 推送到 main 分支时触发
  push:
    branches: [ main, master ]
  # 手动触发
  workflow_dispatch:
  # Pull Request 时触发
  pull_request:
    branches: [ main, master ]

# 权限配置（用于创建 Release）
permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      # 2. 设置 Java 环境
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      # 3. 设置 Flutter 环境
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      # 4. 配置签名（从 GitHub Secrets 读取）
      - name: Configure Signing
        run: |
          cd android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release-keystore.jks
          cat > ../key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=memory-island
          storeFile=release-keystore.jks
          EOF
      
      # 5. 获取依赖
      - name: Get Dependencies
        run: |
          flutter clean
          flutter pub get
      
      # 6. 分析代码（可选，检查语法错误）
      - name: Analyze Code
        run: flutter analyze || true
      
      # 7. 构建 APK（只构建 ARM64，减小体积约 65%）
      - name: Build APK
        run: flutter build apk --release --target-platform android-arm64
      
      # 8. 获取版本号
      - name: Get Version
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          BUILD_NUMBER=$(grep 'version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
      
      # 9. 上传 APK 文件（Artifacts，会打包成 zip）
      - name: Upload APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: memory-island-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
      
      # 10. 创建 Release 并上传 APK（仅在 push 到 main 时）
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: 记忆岛 v${{ steps.version.outputs.version }}
          body: |
            ## 记忆岛 v${{ steps.version.outputs.version }}
            
            ### 下载
            - 下载下方 `app-release.apk` 文件安装
            
            ### 更新内容
            - 🧪 新增 OPPO 灵动岛支持（测试功能）
            - 支持 OPPO/一加设备的智能岛显示取件码
            - 优化通知显示效果
            
            ### 版本说明
            - 此版本为**测试版**，包含实验性功能
            - 稳定版请下载 v1.0.29
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: true
